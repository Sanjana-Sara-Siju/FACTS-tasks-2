<!-- we use JavaScript to upload the file without reloading the page -->
<!-- so that the user stays on the same page -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Kilani Fabrics - Visual Search</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        /* CSS Styling */

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa; 
        }
        
        h1, h2, h3, h4, h5, h6, .card-title, .fw-bold {
            font-family: 'Montserrat', sans-serif;
        }

        .text-brand { color: #783191; }
        .bg-brand { background-color: #783191; color: white; }
        
        .btn-brand {
            background-color: #783191;
            color: white;
            font-family: 'Montserrat', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
        }
        
        .btn-brand:hover {
            background-color: #5d2570; /* darker purple for hover state */
            color: white;
        }
        
        /* subtle lift effect for result cards */
        .result-card { transition: transform 0.2s; }
        .result-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(120, 49, 145, 0.15); }
        
        /* image constraints */
        .img-preview { object-fit: cover; height: 250px; width: 100%; border-radius: 6px; }

    </style>
</head>
<body>

    <div class="container py-5">
        
        <!-- Header section -->
        <div class="text-center mb-5">
            <h1 class="text-brand fw-bold">Al Kilani Fabrics</h1>
            <p class="text-muted">Visual Similarity Search</p>
        </div>

        <!-- Upload section -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 text-center">
                        <h4 class="card-title text-brand mb-4">Upload a fabric sample to search:</h4>
                        
                        <!-- Standard Bootstrap file input -->
                        <div class="mb-4 text-start">
                            <label for="fileInput" class="form-label text-muted fw-bold">Select Fabric Image</label>
                            <input class="form-control form-control-lg" type="file" id="fileInput" accept="image/*" style="border: 2px solid #e9ecef;">
                        </div>
                        
                        <button class="btn btn-brand w-100 py-2 fw-bold" onclick="uploadFile()">Search!</button>
                        
                        <!-- Status alert -->
                        <div id="uploadStatus" class="alert alert-info mt-3 d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results section (hidden by default) -->
        <div id="resultsSection" class="d-none">
            <h3 class="text-brand border-bottom border-brand pb-2 mb-4">Database matches identified..</h3>
            
            <!-- Bootstrap Grid: 3 columns on desktop, stacks on mobile -->
            <div class="row g-4">
                
                <!-- Uploaded Image -->
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm border-0 result-card">
                        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
                            <h5 class="card-title text-muted">Your uploaded sample</h5>
                        </div>
                        <div class="card-body text-center">
                            <img id="imagePreview" src="" alt="Uploaded Sample" class="img-preview mb-3 shadow-sm border">
                        </div>
                    </div>
                </div>

                <!-- Color match -->
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm border-0 result-card" style="border-top: 5px solid #783191 !important;">
                        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
                            <h5 class="card-title text-brand">Closest Color Match</h5>
                        </div>
                        <div class="card-body text-center">
                            <img id="colorMatchImg" src="" alt="Color Match" class="img-preview mb-3 shadow-sm">
                            <div class="p-2 bg-light rounded">
                                <p class="mb-1"><strong>Serial Number:</strong> <span id="colorSerial" class="text-brand fs-5 fw-bold"></span></p>
                                <p class="mb-0 text-muted small">Confidence: <span id="colorConf" class="fw-bold"></span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Texture match -->
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm border-0 result-card" style="border-top: 5px solid #783191 !important;">
                        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
                            <h5 class="card-title text-brand">Closest Texture Match</h5>
                        </div>
                        <div class="card-body text-center">
                            <img id="textureMatchImg" src="" alt="Texture Match" class="img-preview mb-3 shadow-sm">
                            <div class="p-2 bg-light rounded">
                                <p class="mb-1"><strong>Serial Number:</strong> <span id="textureSerial" class="text-brand fs-5 fw-bold"></span></p>
                                <p class="mb-0 text-muted small">Confidence: <span id="textureConf" class="fw-bold"></span></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>


    <script>
        // file uploads rely on network requests
        // network requests are asynchronous, meaning the browser needs to pause execution 
        // until the server finishes receiving and processing the file.
        // Using "async" allows to use "await" later, which prevents function from moving 
        // forward until file upload successfully completes.
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const uploadStatus = document.getElementById('uploadStatus');
            const resultsSection = document.getElementById('resultsSection');

            if (fileInput.files.length === 0) // strict equality 
            {
                alert("Please select an image first..."); // alerts user if they click "Search!" w/o uploading anything
                return;
            }

            const file = fileInput.files[0]; // extracts very 1st file 
            const formData = new FormData(); // creates a special object that bundles binary data into an HTTP request                                                                             
            formData.append("file", file); // adds file package into formData 

            uploadStatus.innerText = "Searching database...";
            uploadStatus.className = "alert alert-info mt-3"; // status alert  
            resultsSection.classList.add("d-none"); // Hide previous results if uploading a second time

            try {
                // fetch API used to make async HTTP requests to retrieve/send data across a network
                const response = await fetch('/search', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json(); // unpacks raw JSON returned into JS dict object

                if (data.error) {
                    uploadStatus.innerText = "Error: " + data.error;
                } else {
                    uploadStatus.innerText = "Successfully processed and matched!";

                    // creating a local URL for the uploaded image and assigning it to the preview tag
                    const previewImage = document.getElementById('imagePreview');
                    // grabbing the image user just uploaded & displays it immediately
                    previewImage.src = URL.createObjectURL(file);

                    // injecting the returned JSON data into the HTML span tags
                    document.getElementById('colorSerial').innerText = data.color_match_serial;
                    document.getElementById('colorConf').innerText = data.color_match_confidence;
                    
                    document.getElementById('textureSerial').innerText = data.texture_match_serial;
                    document.getElementById('textureConf').innerText = data.texture_match_confidence;

                    // dynamically updating the source paths for the database matches
                    document.getElementById('colorMatchImg').src = `/static/processed_pics/${data.color_match_serial}.jpg`;
                    document.getElementById('textureMatchImg').src = `/static/processed_pics/${data.texture_match_serial}.jpg`;

                    // unhiding results section
                    resultsSection.classList.remove("d-none");                }

            } catch (error) {
                uploadStatus.innerText = "An error occurred during upload or database search.";
                uploadStatus.className = "alert alert-danger mt-3";
                console.error(error);
            }
        }
    </script>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
